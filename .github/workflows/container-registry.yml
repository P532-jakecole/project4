name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ part2 ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: mvn -q test

      - uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: mvn -q package -DskipTests

      - run: docker build -t project2 .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/part2'
    steps:
      - run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

